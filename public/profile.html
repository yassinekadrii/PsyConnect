<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - PsyConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--text-dark);
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-light);
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            display: none;
        }

        .error {
            background: #fef2f2;
            color: var(--error-color);
            border: 1px solid #fee2e2;
        }

        .success {
            background: #ecfdf5;
            color: var(--success-color);
            border: 1px solid #d1fae5;
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
            <button class="lang-btn" id="langSwitcher" onclick="toggleLanguage()"
                style="width: auto; padding: 0.4rem 0.8rem; border: 1px solid var(--border-color); background: white; cursor: pointer; font-size: 0.8rem; border-radius: 4px; font-weight: 600; color: var(--text-dark); margin: 0;">FR</button>
        </div>
        <h2 data-i18n="profile.title">Modifier mon profil</h2>
        <div id="messageBox" class="message"></div>
        <form id="profileForm" onsubmit="handleUpdate(event)">
            <div class="form-group">
                <label data-i18n="profile.firstname">Prénom</label>
                <input type="text" id="firstName">
            </div>
            <div class="form-group">
                <label data-i18n="profile.lastname">Nom</label>
                <input type="text" id="lastName">
            </div>
            <div class="form-group">
                <label data-i18n="profile.email">Email</label>
                <input type="email" id="email" disabled style="background: #f1f5f9;">
            </div>
            <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid var(--border-color);">
            <div class="form-group">
                <label data-i18n="profile.current_password">Mot de passe actuel (requis pour changer)</label>
                <input type="password" id="currentPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label data-i18n="profile.new_password">Nouveau mot de passe</label>
                <input type="password" id="newPassword" placeholder="••••••••">
            </div>
            <button type="submit" data-i18n="profile.submit">Enregistrer les modifications</button>
        </form>
        <a href="#" onclick="goBack()" class="back-link" data-i18n="profile.back">Retour au tableau de bord</a>
    </div>

    <script src="js/i18n.js"></script>
    <script>
        const API_URL = 'http://localhost:3001/api';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) window.location.href = 'login.html';

        // Load initial data
        document.getElementById('firstName').value = user.firstName || '';
        document.getElementById('lastName').value = user.lastName || '';
        document.getElementById('email').value = user.email || '';

        function goBack() {
            if (user.role === 'admin') window.location.href = 'admin-dashboard.html';
            else if (user.role === 'doctor') window.location.href = 'doctor-chat.html'; // Or dashboard if exists
            else window.location.href = 'patient-dashboard.html';
        }

        async function handleUpdate(e) {
            e.preventDefault();
            const messageBox = document.getElementById('messageBox');
            messageBox.style.display = 'none';

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            const payload = { firstName, lastName };

            if (newPassword) {
                if (!currentPassword) {
                    showMessage(getNestedTranslation(currentLang, 'profile.auth_error'), 'error');
                    return;
                }
                payload.currentPassword = currentPassword;
                payload.newPassword = newPassword;
            }

            try {
                const response = await fetch(`${API_URL}/user/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    showMessage(getNestedTranslation(currentLang, 'profile.success'), 'success');
                    // Update user in local storage
                    const updatedUser = { ...user, ...data.user };
                    localStorage.setItem('user', JSON.stringify(updatedUser));

                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                } else {
                    showMessage(data.message || getNestedTranslation(currentLang, 'profile.error'), 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage(getNestedTranslation(currentLang, 'profile.error'), 'error');
            }
        }

        function showMessage(text, type) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = `message ${type}`;
            box.style.display = 'block';
        }
    </script>
</body>

</html>
