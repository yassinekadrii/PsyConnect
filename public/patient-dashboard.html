<!-- 
  @file public/patient-dashboard.html
  @description Dashboard for patients to manage their health journey.
  
  Features:
  - Overview of upcoming consultations
  - Quick access to medical history (prescriptions)
  - Profile summary and quick links
-->
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trouver un Médecin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
        }

        .navbar {
            background: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-light);
        }

        .doctors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .doctor-card {
            background: var(--white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .doctor-card:hover {
            transform: translateY(-5px);
        }

        .doctor-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #e0e7ff;
            margin-bottom: 1rem;
            object-fit: cover;
        }

        .doctor-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .doctor-specialty {
            color: var(--primary-color);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .doctor-bio {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .btn-contact {
            background: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-contact:hover {
            background: #4f46e5;
        }

        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .mode-online {
            background: #e0e7ff;
            color: #4338ca;
        }

        .mode-presence {
            background: #dcfce7;
            color: #15803d;
        }

        .mode-both {
            background: #fef3c7;
            color: #92400e;
        }
    </style>
    <script src="js/notifications.js"></script>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="images/image.png" alt="Logo">
        </a>
        <div id="userMenu">
            <button onclick="logout()"
                style="padding: 0.5rem 1rem; border: 1px solid var(--border-color); background: white; border-radius: 6px; cursor: pointer;">Déconnexion</button>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1 data-i18n="sections.specialists">Nos Spécialistes</h1>
            <p data-i18n="sections.specialists_subtitle">Trouvez le psychologue qui vous correspond et commencez votre
                parcours de bien-être.</p>
        </div>

        <div class="doctors-grid" id="doctorsGrid">
            <!-- Doctors will be loaded here -->
            <p style="grid-column: 1/-1; text-align: center; color: var(--text-light);" data-i18n="common.loading">
                Chargement des médecins...</p>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // Helper for fetch with timeout
        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 10000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            const response = await fetch(resource, {
                ...options,
                signal: controller.signal
            });
            clearTimeout(id);
            return response;
        }

        // Check auth
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) {
            // Optional: redirect to login or show simplified view
            document.getElementById('userMenu').innerHTML = `
                <a href="login.html" style="text-decoration: none; color: var(--primary-color); font-weight: 600; margin-right: 1rem;">Connexion</a>
                <a href="register.html" style="text-decoration: none; background: var(--primary-color); color: white; padding: 0.5rem 1rem; border-radius: 6px;">S'inscrire</a>
            `;
        } else {
            document.getElementById('userMenu').innerHTML = `
                <a href="profile.html" style="text-decoration: none; color: var(--text-dark); font-weight: 500; margin-right: 1rem;">Mon Profil</a>
                <span style="margin-right: 1rem;">Bonjour, ${user.firstName}</span>
                <button onclick="logout()" style="padding: 0.5rem 1rem; border: 1px solid var(--border-color); background: white; border-radius: 6px; cursor: pointer;">Déconnexion</button>
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        async function fetchDoctors() {
            try {
                const response = await fetchWithTimeout(`${API_URL}/patient/doctors`);
                const data = await response.json();

                const grid = document.getElementById('doctorsGrid');

                if (data.success && data.doctors.length > 0) {
                    grid.innerHTML = data.doctors.map(doc => {
                        let modeClass = 'mode-online';
                        let modeLabel = 'En ligne';
                        if (doc.consultationMode === 'presence') { modeClass = 'mode-presence'; modeLabel = 'Cabinet'; }
                        else if (doc.consultationMode === 'both') { modeClass = 'mode-both'; modeLabel = 'En ligne & Cabinet'; }

                        const avatarSrc = doc.profilePicture || `https://ui-avatars.com/api/?name=${doc.firstName}+${doc.lastName}&background=6366f1&color=fff`;

                        return `
                        <div class="doctor-card">
                            <img src="${avatarSrc}" alt="${doc.firstName}" class="doctor-avatar">
                            <h3 class="doctor-name">Dr. ${doc.firstName} ${doc.lastName}</h3>
                            <div class="mode-badge ${modeClass}">${modeLabel}</div>
                            <div class="doctor-specialty">${doc.specialty || 'Psychologue'}</div>
                            <p class="doctor-bio">${doc.bio ? doc.bio.substring(0, 100) + (doc.bio.length > 100 ? '...' : '') : 'Aucune description disponible.'}</p>
                            <button onclick="contactDoctor('${doc._id}', '${doc.firstName} ${doc.lastName}')" class="btn-contact">Contacter</button>
                        </div>
                    `}).join('');
                } else {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Aucun médecin disponible pour le moment.</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                const msg = error.name === 'AbortError' ? 'Le serveur met trop de temps à répondre.' : 'Erreur de chargement des médecins.';
                document.getElementById('doctorsGrid').innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: red;">${msg}</p>`;
                if (typeof showNotification === 'function') {
                    showNotification(msg, 'error');
                }
            }
        }

        function contactDoctor(id, name) {
            if (!token) {
                showNotification('Veuillez vous connecter pour contacter un médecin.', 'info');
                setTimeout(() => window.location.href = 'login.html', 2000);
                return;
            }
            // Logic to open chat with this doctor
            // Store selected doctor in localStorage or pass as query param
            localStorage.setItem('selectedDoctor', JSON.stringify({ id, name }));
            window.location.href = 'patient-chat.html';
        }

        fetchDoctors();
    </script>
</body>

</html>
