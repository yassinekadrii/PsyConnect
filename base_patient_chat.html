<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Discussions - PsyConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/i18n.js"></script>
    <style>
        /* Reuse styles from doctor-chat.html for consistency */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --chat-bg: #e0e7ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            height: 70px;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-color);
            text-decoration: none;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .sidebar {
            width: 350px;
            background: var(--white);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .patient-list {
            flex: 1;
            overflow-y: auto;
        }

        .patient-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }

        .patient-item:hover,
        .patient-item.active {
            background: var(--bg-light);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ddd;
            margin-right: 1rem;
            object-fit: cover;
        }

        .patient-info {
            flex: 1;
        }

        .patient-name {
            font-weight: 600;
            color: var(--text-dark);
        }

        .last-msg {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .msg-time {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .chat-header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
        }

        .video-call-btn {
            background: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }

        .messages-container {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            background-color: #f0f2f5;
            background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
            opacity: 0.9;
        }

        .message {
            max-width: 60%;
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            position: relative;
            font-size: 0.95rem;
        }

        .message.received {
            background: var(--white);
            align-self: flex-start;
            border-top-left-radius: 0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-right: auto;
        }

        .message.sent {
            background: #dcf8c6;
            align-self: flex-end;
            border-top-right-radius: 0;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            margin-left: auto;
        }

        .input-area {
            padding: 1rem 2rem;
            background: var(--white);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
        }

        .msg-input {
            flex: 1;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            outline: none;
        }

        .send-btn {
            background: transparent;
            border: none;
            color: var(--primary-color);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">PsyConnect</a>
        <div style="display: flex; gap: 2rem; align-items: center;">
            <div>
                <button class="lang-btn" id="langSwitcher" onclick="toggleLanguage()"
                    style="border: 1px solid var(--border-color); background: white; cursor: pointer; font-size: 0.8rem; padding: 0.4rem 0.8rem; border-radius: 4px; font-weight: 600;">FR</button>
            </div>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <a href="index.html" style="text-decoration: none; color: var(--text-dark); font-weight: 500;"
                    data-i18n="nav.accueil">Accueil</a>
                <button onclick="logout()"
                    style="background: none; border: none; color: #ef4444; font-weight: 600; cursor: pointer;"
                    data-i18n="nav.logout">Déconnexion</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div style="padding: 1rem; border-bottom: 1px solid var(--border-color); font-weight: 600;">Vos Discussions
            </div>
            <div class="patient-list" id="doctorList">
                <div style="padding: 1rem; color: var(--text-light); text-align: center;">Chargement...</div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div style="display: flex; align-items: center;">
                    <img src="https://ui-avatars.com/api/?name=Médecin&background=random" alt="Doctor" class="avatar"
                        id="headerAvatar" style="opacity: 0.5;">
                    <div>
                        <h3 id="chatDoctorName">Sélectionnez un médecin</h3>
                        <span style="color: var(--text-light); font-size: 0.85rem;" id="statusText">...</span>
                    </div>
                </div>
                <div style="display: flex; align-items: center;">
                    <button id="prescriptionBtn" onclick="openPrescriptionsModal()"
                        style="background: #10b981; color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; display: none;">
                        <span>📜</span> <span data-i18n="chat.header.view_prescriptions">Ordonnances</span>
                    </button>
                    <button class="video-call-btn" onclick="startVideoCall()" style="display: none;" id="videoCallBtn">
                        📹 Rejoindre la vidéo
                    </button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="no-chat-selected"
                    style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-light);">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">💬</div>
                    <h3>Sélectionnez une discussion</h3>
                    <p>Ou contactez un spécialiste depuis l'accueil.</p>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Écrivez votre message..."
                    data-i18n="chat.form.placeholder" onkeypress="handleKeyPress(e)" disabled>
                <button id="sendBtn" onclick="sendMessage()" disabled data-i18n="chat.form.send">Envoyer</button>
            </div>
        </div>
    </div>

    <!-- Video Call Modal -->
    <div id="videoModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;">
        <div
            style="position: relative; width: 80%; max-width: 800px; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);">
            <video id="remoteVideo" autoplay playsinline
                style="width: 100%; height: 100%; object-fit: cover; background: #222;"></video>
            <video id="localVideo" autoplay playsinline muted
                style="position: absolute; bottom: 20px; right: 20px; width: 160px; height: 90px; object-fit: cover; border: 2px solid white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); background: #333;"></video>
            <div
                style="position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 4px; font-size: 0.8rem;">
                En attente de connexion...
            </div>
        </div>
        <button onclick="endCall()"
            style="margin-top: 2rem; background: #ef4444; color: white; padding: 1rem 2rem; border: none; border-radius: 50px; cursor: pointer; font-size: 1.1rem; font-weight: 600; box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3); transition: transform 0.2s; display: flex; align-items: center; gap: 0.5rem;">
            <span>❌</span> Raccrocher
        </button>
    </div>

    <!-- Prescriptions Modal -->
    <div id="prescriptionsModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1001; justify-content: center; align-items: center;">
        <div
            style="background: white; padding: 2rem; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="color: var(--text-dark);">📜 Mes Ordonnances</h2>
                <button onclick="closePrescriptionsModal()"
                    style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="prescriptionsList">
                <p style="text-align: center; color: var(--text-light);">Chargement des ordonnances...</p>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/webrtc.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const API_URL = 'http://localhost:3001/api';
        let currentReceiverId = null;

        if (!token || user.role !== 'patient') {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').textContent = user.firstName;

        // Initialize
        initChat();

        async function initChat() {
            // 1. Fetch existing conversations
            await fetchConversations();

            // 2. Check if coming from "Contact" button
            const selectedDoctor = JSON.parse(localStorage.getItem('selectedDoctor'));
            if (selectedDoctor) {
                // Select this doctor immediately
                selectDoctor({
                    _id: selectedDoctor.id,
                    firstName: selectedDoctor.name.split(' ')[0], // Approx
                    lastName: selectedDoctor.name.split(' ').slice(1).join(' ') || ''
                }, true); // force selection
            }

            // Poll for new messages/conversations
            setInterval(() => {
                if (currentReceiverId) loadMessages(currentReceiverId);
                fetchConversations();
            }, 3000);
        }

        async function fetchConversations() {
            try {
                const response = await fetch(`${API_URL}/messages/conversations`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success) {
                    renderSidebar(data.conversations);
                }
            } catch (error) {
                console.error('Error fetching conversations:', error);
            }
        }

        function renderSidebar(conversations) {
            const list = document.getElementById('doctorList');

            if (conversations.length === 0) {
                list.innerHTML = '<div style="padding: 1rem; color: var(--text-light); text-align: center;">Aucune discussion.</div>';
                return;
            }

            let html = '';
            conversations.forEach(conv => {
                const isActive = currentReceiverId === conv.user._id ? 'active' : '';
                html += `
                    <div class="patient-item ${isActive}" onclick="selectDoctorFromSidebar('${conv.user._id}', '${conv.user.firstName}', '${conv.user.lastName}')">
                        <img src="https://ui-avatars.com/api/?name=${conv.user.firstName}+${conv.user.lastName}&background=random" alt="Doctor" class="avatar">
                        <div class="patient-info">
                            <div class="patient-name">Dr. ${conv.user.firstName} ${conv.user.lastName}</div>
                            <div class="last-msg">${conv.lastMessage.substring(0, 30)}${conv.lastMessage.length > 30 ? '...' : ''}</div>
                             <div class="msg-time">${new Date(conv.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        // Helper for onclick in HTML string
        window.selectDoctorFromSidebar = (id, firstName, lastName) => {
            selectDoctor({ _id: id, firstName, lastName });
        };

        function selectDoctor(doctor, isNew = false) {
            currentReceiverId = doctor._id;

            // Update Header
            document.getElementById('chatDoctorName').textContent = `Dr. ${doctor.firstName} ${doctor.lastName}`;
            document.getElementById('statusText').textContent = 'En ligne';
            document.getElementById('headerAvatar').src = `https://ui-avatars.com/api/?name=${doctor.firstName}+${doctor.lastName}&background=6366f1&color=fff`;
            document.getElementById('headerAvatar').style.opacity = '1';

            // Show Video Call Button and Prescription Button
            document.getElementById('videoCallBtn').style.display = 'block';
            document.getElementById('prescriptionBtn').style.display = 'block';

            // Enable inputs
            document.getElementById('messageInput').disabled = false;
            const sendBtn = document.getElementById('sendBtn');
            if (sendBtn) sendBtn.disabled = false;

            document.getElementById('messageInput').focus();

            // Load messages
            loadMessages(currentReceiverId);

            // Hide empty state if present
            const emptyState = document.querySelector('.no-chat-selected');
            if (emptyState) emptyState.style.display = 'none';

            fetchConversations();
        }

        async function loadMessages(userId) {
            try {
                const response = await fetch(`${API_URL}/messages/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success) {
                    const container = document.getElementById('messagesContainer');
                    const wasAtBottom = container.scrollHeight - container.scrollTop === container.clientHeight;

                    // Cleanup placeholders
                    if (container.querySelector('.no-chat-selected')) {
                        container.innerHTML = '';
                    }

                    if (data.messages.length === 0) {
                        container.innerHTML = '<div style="text-align: center; margin-top: 2rem; color: var(--text-light);"><p>Démarrez la conversation...</p></div>';
                    } else {
                        // Check if we need to full rebuild or just append (full rebuild is safer for sync)
                        // For this simple app, full rebuild of the innerHTML is acceptable
                        container.innerHTML = '';
                        data.messages.forEach(msg => {
                            const div = document.createElement('div');
                            // Fix for user.id logic - assuming user._id is present
                            const userId = user.id || user._id; // Updated logic
                            div.className = `message ${msg.sender === userId ? 'sent' : 'received'}`;
                            div.textContent = msg.content;
                            container.appendChild(div);
                        });
                    }

                    container.scrollTop = container.scrollHeight;
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (content && currentReceiverId) {
                try {
                    const response = await fetch(`${API_URL}/messages`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            receiverId: currentReceiverId,
                            content
                        })
                    });

                    if (response.ok) {
                        input.value = '';
                        loadMessages(currentReceiverId);
                        fetchConversations(); // Update sidebar list order
                    }
                } catch (error) {
                    console.error('Error sending message:', error);
                    alert('Erreur lors de l\'envoi du message');
                }
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function startVideoCall() {
            if (!currentReceiverId) {
                alert('Veuillez d\'abord sélectionner une discussion.');
                return;
            }

            const userId = user.id || user._id;
            // Create a unique room ID based on participants
            const participants = [userId, currentReceiverId].sort();
            const roomId = participants.join('-');

            startVideoCallSession(roomId, userId);
        }

        function endCall() {
            endCallSession();
        }

        // Prescription Functions
        function openPrescriptionsModal() {
            if (!currentReceiverId) return;
            document.getElementById('prescriptionsModal').style.display = 'flex';
            loadPrescriptions();
        }

        function closePrescriptionsModal() {
            document.getElementById('prescriptionsModal').style.display = 'none';
        }

        async function loadPrescriptions() {
            try {
                const response = await fetch(`${API_URL}/prescriptions/patient/${user.id || user._id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                const container = document.getElementById('prescriptionsList');
                if (data.success) {
                    if (data.prescriptions.length === 0) {
                        container.innerHTML = '<p style="text-align: center; color: var(--text-light); padding: 2rem;">Aucune ordonnance trouvée.</p>';
                        return;
                    }

                    // Store prescriptions for PDF generation
                    window.currentPrescriptions = data.prescriptions;

                    container.innerHTML = data.prescriptions.map(p => `
                        <div id="presc-${p._id}" style="border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; background: #fbfcfe;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                                <strong style="color: var(--primary-color);">Dr. ${p.doctor.firstName} ${p.doctor.lastName}</strong>
                                <span style="font-size: 0.85rem; color: var(--text-light);">${new Date(p.createdAt).toLocaleDateString('fr-FR')}</span>
                            </div>
                            <table style="width: 100%; border-collapse: collapse; margin-bottom: 1rem;">
                                <thead>
                                    <tr style="text-align: left; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; color: var(--text-light);">
                                        <th style="padding: 0.5rem 0;">Médicament</th>
                                        <th>Dosage</th>
                                        <th>Durée</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${p.medicines.map(m => `
                                        <tr style="border-bottom: 1px solid #f1f5f9; font-size: 0.95rem;">
                                            <td style="padding: 0.5rem 0;">
                                                <div style="font-weight: 600;">${m.name}</div>
                                                ${m.notes ? `<div style="font-size: 0.8rem; color: #10b981; margin-top: 2px;">📝 ${m.notes}</div>` : ''}
                                            </td>
                                            <td>${m.dosage}</td>
                                            <td>${m.duration}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                            ${p.instructions ? `
                                <div style="font-size: 0.9rem; color: var(--text-dark); background: #f1f5f9; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem;">
                                    <strong>Instructions :</strong> ${p.instructions}
                                </div>
                            ` : ''}
                            <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                                 <button onclick="downloadPrescriptionPDF('${p._id}')" style="font-size: 0.85rem; background: var(--primary-color); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 0.3rem;">📄 Télécharger PDF</button>
                                 <button onclick="window.print()" style="font-size: 0.85rem; background: white; border: 1px solid var(--border-color); color: var(--text-dark); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;">🖨️ Imprimer</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<p style="text-align: center; color: #ef4444;">${data.message}</p>`;
                }
            } catch (error) {
                console.error('Error loading prescriptions:', error);
                document.getElementById('prescriptionsList').innerHTML = '<p style="text-align: center; color: #ef4444;">Erreur lors du chargement des ordonnances.</p>';
            }
        }

        async function downloadPrescriptionPDF(id) {
            const presc = window.currentPrescriptions.find(p => p._id === id);
            if (!presc) return;

            const element = document.createElement('div');
            element.style.padding = '40px';
            element.style.fontFamily = 'Inter, sans-serif';
            element.innerHTML = `
                <div style="text-align: center; margin-bottom: 40px; border-bottom: 2px solid #6366f1; padding-bottom: 20px;">
                    <h1 style="color: #6366f1; margin: 0;">PsyConnect</h1>
                    <p style="color: #64748b; margin-top: 5px;">Ordonnance Médicale</p>
                </div>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 40px;">
                    <div>
                        <p style="margin: 0; color: #64748b; font-size: 0.9rem;">Médecin :</p>
                        <h3 style="margin: 5px 0;">Dr. ${presc.doctor.firstName} ${presc.doctor.lastName}</h3>
                    </div>
                    <div style="text-align: right;">
                        <p style="margin: 0; color: #64748b; font-size: 0.9rem;">Date :</p>
                        <h3 style="margin: 5px 0;">${new Date(presc.createdAt).toLocaleDateString('fr-FR')}</h3>
                    </div>
                </div>

                <div style="margin-bottom: 30px;">
                    <p style="margin: 0; color: #64748b; font-size: 0.9rem;">Patient :</p>
                    <h3 style="margin: 5px 0;">${user.firstName} ${user.lastName}</h3>
                </div>

                <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
                    <thead>
                        <tr style="background: #f8fafc; text-align: left; border-bottom: 2px solid #e2e8f0;">
                            <th style="padding: 12px 10px;">Médicament</th>
                            <th style="padding: 12px 10px;">Dosage</th>
                            <th style="padding: 12px 10px;">Durée</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${presc.medicines.map(m => `
                            <tr style="border-bottom: 1px solid #e2e8f0;">
                                <td style="padding: 12px 10px;">
                                    <div style="font-weight: 600;">${m.name}</div>
                                    ${m.notes ? `<div style="font-size: 0.85rem; color: #10b981; margin-top: 4px;">Instruction : ${m.notes}</div>` : ''}
                                </td>
                                <td style="padding: 12px 10px;">${m.dosage}</td>
                                <td style="padding: 12px 10px;">${m.duration}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>

                ${presc.instructions ? `
                    <div style="margin-top: 30px; padding: 20px; background: #f1f5f9; border-radius: 8px;">
                        <p style="margin: 0 0 10px 0; color: #64748b; font-size: 0.9rem;">Commentaires du médecin :</p>
                        <p style="margin: 0; line-height: 1.6;">${presc.instructions}</p>
                    </div>
                ` : ''}

                <div style="margin-top: 60px; text-align: center; font-size: 0.8rem; color: #94a3b8; border-top: 1px solid #e2e8f0; padding-top: 20px;">
                    Cette ordonnance a été générée électroniquement sur PsyConnect.
                </div>
            `;

            const opt = {
                margin: 0,
                filename: `Ordonnance_${new Date(presc.createdAt).toLocaleDateString('fr-CA')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('selectedDoctor');
            window.location.href = 'index.html';
        }
    </script>
</body>
